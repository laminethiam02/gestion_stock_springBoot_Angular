<div class="container mt-4">
    <div class="row">
        <div class="col-12">
            <div class="card">
                <div class="card-header d-flex justify-content-between align-items-center">
                    <h3 class="card-title mb-0">Liste des catégories</h3>
                    <button class="btn btn-primary" (click)="onAdd()">
                        <i class="fas fa-plus mr-2"></i>Ajouter une catégorie
                    </button>
                </div>
                <div class="card-body">
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <div class="input-group">
                                <input type="text" class="form-control" placeholder="Rechercher..."
                                       [(ngModel)]="searchTerm" (keyup.enter)="onSearch()">
                                <div class="input-group-append">
                                    <button class="btn btn-outline-secondary" (click)="onSearch()">
                                        <i class="fas fa-search"></i>
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="alert alert-danger" *ngIf="error">{{ error }}</div>

                    <div class="table-responsive">
                        <table class="table table-striped table-bordered">
                            <thead class="thead-dark">
                            <tr><th>ID</th><th>Nom</th><th>Description</th><th>Actions</th></tr>
                            </thead>
                            <tbody>
                            <tr *ngIf="loading"><td colspan="4" class="text-center">Chargement...</td></tr>
                            <tr *ngFor="let c of categories">
                                <td>{{ c.id }}</td>
                                <td>{{ c.name }}</td>
                                <td>{{ c.description }}</td>
                                <td>
                                    <button class="btn btn-warning btn-sm mr-1" (click)="onEdit(c.id!)">
                                        <i class="fas fa-edit"></i> Modifier
                                    </button>
                                    <button class="btn btn-danger btn-sm" (click)="onDelete(c.id!)">
                                        <i class="fas fa-trash"></i> Supprimer
                                    </button>
                                </td>
                            </tr>
                            <tr *ngIf="categories.length === 0 && !loading">
                                <td colspan="4" class="text-center">Aucune catégorie</td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
