<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header"><h3>Ajouter une catégorie</h3></div>
                <div class="card-body">
                    <form [formGroup]="form" (ngSubmit)="onSubmit()">
                        <div class="form-group">
                            <label>Nom *</label>
                            <input type="text" formControlName="name" class="form-control">
                            <div class="text-danger" *ngIf="form.get('name')?.errors?.['required']">Requis</div>
                        </div>
                        <div class="form-group">
                            <label>Description</label>
                            <textarea formControlName="description" class="form-control" rows="3"></textarea>
                        </div>
                        <div class="alert alert-danger" *ngIf="error">{{ error }}</div>
                        <div class="text-right">
                            <button type="button" class="btn btn-secondary mr-2" (click)="onCancel()">Annuler</button>
                            <button type="submit" class="btn btn-primary" [disabled]="form.invalid || loading">
                                <span *ngIf="loading" class="spinner-border spinner-border-sm mr-2"></span>
                                Créer
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
