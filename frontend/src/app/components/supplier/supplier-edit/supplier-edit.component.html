<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card">
                <div class="card-header d-flex align-items-center">
                    <i class="fas fa-edit mr-2"></i>
                    <h3 class="mb-0">Modifier le fournisseur</h3>
                </div>
                <div class="card-body">
                    <!-- Loader -->
                    <div *ngIf="loading" class="text-center py-4">
                        <div class="spinner-border text-warning" role="status">
                            <span class="sr-only">Chargement...</span>
                        </div>
                        <p class="mt-2 text-muted">Chargement des données...</p>
                    </div>

                    <!-- Formulaire -->
                    <form [formGroup]="form" (ngSubmit)="onSubmit()" *ngIf="!loading">
                        <!-- Champ Nom -->
                        <div class="form-group">
                            <label>
                                <i class="fas fa-tag mr-1"></i> Nom <span class="text-danger">*</span>
                            </label>
                            <div class="input-group">
                                <div class="input-group-prepend">
                                    <span class="input-group-text">
                                        <i class="fas fa-building"></i>
                                    </span>
                                </div>
                                <input type="text"
                                       formControlName="name"
                                       class="form-control"
                                       [class.is-invalid]="form.get('name')?.invalid && form.get('name')?.touched"
                                       placeholder="Nom du fournisseur"
                                       autofocus>
                            </div>
                            <div class="text-danger" *ngIf="form.get('name')?.errors?.['required']">
                                <i class="fas fa-exclamation-circle mr-1"></i> Le nom est obligatoire.
                            </div>
                            <div class="text-danger" *ngIf="form.get('name')?.errors?.['maxlength']">
                                <i class="fas fa-exclamation-circle mr-1"></i> Maximum 150 caractères.
                            </div>
                            <small class="form-text text-muted" *ngIf="!form.get('name')?.errors">
                                Nom de l'entreprise ou du contact.
                            </small>
                        </div>

                        <!-- Champ Email -->
                        <div class="form-group">
                            <label>
                                <i class="fas fa-envelope mr-1"></i> Email
                            </label>
                            <div class="input-group">
                                <div class="input-group-prepend">
                                    <span class="input-group-text">
                                        <i class="fas fa-envelope"></i>
                                    </span>
                                </div>
                                <input type="email"
                                       formControlName="email"
                                       class="form-control"
                                       [class.is-invalid]="form.get('email')?.invalid && form.get('email')?.touched"
                                       placeholder="contact@fournisseur.com">
                            </div>
                            <div class="text-danger" *ngIf="form.get('email')?.errors?.['email']">
                                <i class="fas fa-exclamation-circle mr-1"></i> Adresse email invalide.
                            </div>
                            <div class="text-danger" *ngIf="form.get('email')?.errors?.['maxlength']">
                                <i class="fas fa-exclamation-circle mr-1"></i> Maximum 150 caractères.
                            </div>
                        </div>

                        <!-- Champ Téléphone -->
                        <div class="form-group">
                            <label>
                                <i class="fas fa-phone mr-1"></i> Téléphone
                            </label>
                            <div class="input-group">
                                <div class="input-group-prepend">
                                    <span class="input-group-text">
                                        <i class="fas fa-phone-alt"></i>
                                    </span>
                                </div>
                                <input type="text"
                                       formControlName="phone"
                                       class="form-control"
                                       [class.is-invalid]="form.get('phone')?.errors?.['maxlength']"
                                       placeholder="+33 1 23 45 67 89">
                            </div>
                            <div class="text-danger" *ngIf="form.get('phone')?.errors?.['maxlength']">
                                <i class="fas fa-exclamation-circle mr-1"></i> Maximum 50 caractères.
                            </div>
                        </div>

                        <!-- Champ Adresse -->
                        <div class="form-group">
                            <label>
                                <i class="fas fa-map-marker-alt mr-1"></i> Adresse
                            </label>
                            <div class="input-group">
                                <div class="input-group-prepend">
                                    <span class="input-group-text">
                                        <i class="fas fa-map-marker-alt"></i>
                                    </span>
                                </div>
                                <textarea formControlName="address"
                                          class="form-control"
                                          rows="3"
                                          placeholder="Adresse complète (optionnel)"></textarea>
                            </div>
                            <div class="text-danger" *ngIf="form.get('address')?.errors?.['maxlength']">
                                <i class="fas fa-exclamation-circle mr-1"></i> Maximum 500 caractères.
                            </div>
                        </div>

                        <!-- Message d'erreur global -->
                        <div class="alert alert-danger" *ngIf="error">
                            <i class="fas fa-exclamation-triangle mr-2"></i> {{ error }}
                        </div>

                        <!-- Boutons d'action -->
                        <div class="text-right">
                            <button type="button" class="btn btn-secondary mr-2" (click)="onCancel()">
                                <i class="fas fa-times mr-1"></i> Annuler
                            </button>
                            <button type="submit" class="btn btn-warning" [disabled]="form.invalid || loading">
                                <span *ngIf="loading" class="spinner-border spinner-border-sm mr-2"></span>
                                <i class="fas fa-save mr-1" *ngIf="!loading"></i>
                                {{ loading ? 'Modification...' : 'Modifier' }}
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
