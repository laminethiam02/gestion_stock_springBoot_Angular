<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header">Nouveau mouvement</div>
                <div class="card-body">
                    <form [formGroup]="form" (ngSubmit)="onSubmit()">
                        <div class="form-group">
                            <label>Produit *</label>
                            <select formControlName="productId" class="form-control">
                                <option value="">-- Sélectionnez --</option>
                                <option *ngFor="let p of products" [value]="p.id">{{ p.name }} (stock: {{ p.quantity }})</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Type *</label>
                            <select formControlName="type" class="form-control">
                                <option value="ENTREE">Entrée</option>
                                <option value="SORTIE">Sortie</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Quantité *</label>
                            <input type="number" formControlName="quantity" class="form-control" min="1">
                        </div>
                        <div class="form-group">
                            <label>Motif</label>
                            <input type="text" formControlName="reason" class="form-control">
                        </div>
                        <div class="alert alert-danger" *ngIf="error">{{ error }}</div>
                        <div class="text-right">
                            <button type="button" class="btn btn-secondary mr-2" (click)="onCancel()">Annuler</button>
                            <button type="submit" class="btn btn-primary" [disabled]="form.invalid || loading">
                                <span *ngIf="loading" class="spinner-border spinner-border-sm mr-2"></span>
                                Enregistrer
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
